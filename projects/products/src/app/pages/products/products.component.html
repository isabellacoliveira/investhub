<section class="products">
  <h1>🏦 Produtos Financeiros</h1>
<input [formControl]="filter" placeholder="Filtrar produtos..." class="filter-input">
  
  <div class="card" *ngFor="let product of filteredProducts" [class.inactive]="!product.active">
    <strong>{{ product.name }}</strong>
    <p>{{ product.description }}</p>
    <button (click)="toggleActive(product)" [disabled]="false">
      {{ product.active ? 'Desativar (Manutenção)' : 'Ativar' }}
    </button>
    <span class="status">{{ product.active ? '✅ Ativo' : '🔧 Indisponível' }}</span>
  </div>
  <p *ngIf="filteredProducts.length === 0">Nenhum produto encontrado.</p>
  <p>Demo: Clique em "Desativar" para simular outage local.</p>
</section>
